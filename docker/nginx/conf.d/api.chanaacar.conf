# Laravel API served two ways:
#   - https://api.chanaacar.com   (public, TLS)
#   - http://nginx:8080           (internal only, used by the Nuxt SSR proxy)

# Reusable Laravel/PHP-FPM location blocks.
# (Kept inline in both servers below because nginx cannot `include` a location
#  group across server contexts cleanly without a snippet file per directive.)

server {
    listen 443 ssl;
    http2 on;
    server_name api.chanaacar.com;

    ssl_certificate     /etc/letsencrypt/live/chanaacar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chanaacar.com/privkey.pem;
    include /etc/nginx/conf.d/ssl-params.inc;

    root /var/www/public;
    index index.php;
    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_read_timeout 120s;
    }

    # Don't expose dotfiles (except the ACME challenge).
    location ~ /\.(?!well-known).* {
        deny all;
    }
}

# Internal HTTP entry point for the Nuxt server (NUXT_BACKEND_ORIGIN=http://nginx:8080).
# Not published to the host — only reachable on the compose network.
server {
    listen 8080;
    server_name _;

    root /var/www/public;
    index index.php;
    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_read_timeout 120s;
    }
}
