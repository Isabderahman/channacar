# https://chanaacar.com  ->  Nuxt SSR (frontend)
server {
    listen 443 ssl;
    http2 on;
    server_name chanaacar.com www.chanaacar.com;

    ssl_certificate     /etc/letsencrypt/live/chanaacar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chanaacar.com/privkey.pem;
    include /etc/nginx/conf.d/ssl-params.inc;

    # Allow document/image uploads to flow through the Nuxt proxy.
    client_max_body_size 20M;

    # Send www to the apex domain.
    if ($host = www.chanaacar.com) {
        return 301 https://chanaacar.com$request_uri;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 120s;
    }
}
