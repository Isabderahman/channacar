# Port 80: serve the ACME http-01 challenge, redirect everything else to HTTPS.
server {
    listen 80 default_server;
    server_name chanaacar.com www.chanaacar.com api.chanaacar.com;

    location /.well-known/acme-challenge/ {
        root /var/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
